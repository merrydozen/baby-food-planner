<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이유식 플래너 — 우리 아기 맞춤 식단</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-tag">이유식 플래너</div>
  <h1>우리 아기 맞춤<br><em>이유식 플랜</em></h1>
  <p>개월 수 입력 하나로 이번 주 식단이 완성돼요</p>
</header>

<main>
  <div id="form-section">

    <div class="card">
      <p class="card-title">아이 개월 수</p>
      <div class="months-grid" id="months">
        <button class="month-btn" data-v="5">5개월<span class="stage-hint">초기</span></button>
        <button class="month-btn" data-v="6">6개월<span class="stage-hint">초기</span></button>
        <button class="month-btn" data-v="7">7개월<span class="stage-hint">중기</span></button>
        <button class="month-btn" data-v="8">8개월<span class="stage-hint">중기</span></button>
        <button class="month-btn" data-v="9">9개월<span class="stage-hint">중기</span></button>
        <button class="month-btn" data-v="10">10개월<span class="stage-hint">후기</span></button>
        <button class="month-btn" data-v="11">11개월<span class="stage-hint">후기</span></button>
        <button class="month-btn" data-v="12">12개월<span class="stage-hint">후기</span></button>
      </div>
    </div>

    <div class="card">
      <p class="card-title">이번 주 중점 (선택)</p>
      <div class="options-row" id="focus">
        <button class="opt-btn" data-v="채소">🥦 채소 위주</button>
        <button class="opt-btn" data-v="단백질">🍗 단백질 추가</button>
        <button class="opt-btn" data-v="과일">🍓 과일 포함</button>
        <button class="opt-btn" data-v="새재료">✨ 새 재료 도전</button>
      </div>
    </div>

    <div class="card">
      <p class="card-title">알레르기 / 못 먹는 재료 (선택)</p>
      <div class="options-row" id="allergy">
        <button class="opt-btn allergy" data-v="달걀">달걀</button>
        <button class="opt-btn allergy" data-v="밀가루">밀가루</button>
        <button class="opt-btn allergy" data-v="유제품">유제품</button>
        <button class="opt-btn allergy" data-v="콩류">콩류</button>
        <button class="opt-btn allergy" data-v="견과류">견과류</button>
        <button class="opt-btn allergy" data-v="생선">생선</button>
      </div>
    </div>

    <button class="gen-btn" id="genBtn" disabled>개월 수를 선택해주세요</button>

  </div>

  <div id="result-section" style="display:none"></div>
</main>

<footer>
  이유식 플래너 · 개월 수 맞춤 식단 가이드<br>
  <span class="footer-sub">의료적 결정은 반드시 소아과 전문의와 상담하세요</span>
</footer>

<script src="script.js"></script>
</body>
</html>
