<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이유식 플래너 — 우리 아기 맞춤 식단</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --green: #3D6B4F;
    --green-light: #EBF3ED;
    --green-mid: #C2DCCA;
    --green-dark: #1E3D2B;
    --amber: #D4845A;
    --amber-light: #FAF0E8;
    --text: #1A1A1A;
    --text-muted: #6B7A6E;
    --border: #D8E8DB;
    --white: #FFFFFF;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    background: var(--green-dark);
    padding: 2rem 1.5rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -30px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
  }
  .header-tag {
    display: inline-block;
    background: rgba(255,255,255,0.12);
    color: var(--green-mid);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: white;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  header h1 em {
    font-style: italic;
    color: var(--green-mid);
  }
  header p {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    font-weight: 300;
  }

  /* ── Main ── */
  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 1.5rem 1rem 4rem;
  }

  /* ── Card ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
    border: 1px solid var(--border);
  }
  .card-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  /* ── Month selector ── */
  .months-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .month-btn {
    padding: 10px 6px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
  }
  .month-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
  .month-btn.active {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .month-btn .stage-hint {
    display: block;
    font-size: 9px;
    font-weight: 400;
    margin-top: 2px;
    opacity: 0.7;
  }

  /* ── Options ── */
  .options-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .opt-btn {
    padding: 6px 12px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: transparent;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .opt-btn:hover { border-color: var(--green); color: var(--green); }
  .opt-btn.active { background: var(--green-light); border-color: var(--green); color: var(--green); font-weight: 500; }
  .opt-btn.allergy.active { background: var(--amber-light); border-color: var(--amber); color: var(--amber); }

  /* ── Generate button ── */
  .gen-btn {
    width: 100%;
    padding: 15px;
    background: var(--green);
    border: none;
    border-radius: var(--radius);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: -0.01em;
  }
  .gen-btn:hover { background: var(--green-dark); transform: translateY(-1px); }
  .gen-btn:active { transform: translateY(0); }
  .gen-btn:disabled {
    background: var(--border);
    color: var(--text-muted);
    cursor: not-allowed;
    transform: none;
  }

  /* ── Loading ── */
  .loading-wrap {
    text-align: center;
    padding: 3rem 1rem;
  }
  .loading-icon {
    font-size: 36px;
    display: block;
    margin-bottom: 16px;
    animation: spin 2s linear infinite;
  }
  @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
  .loading-wrap p {
    font-size: 14px;
    color: var(--text-muted);
  }

  /* ── Result ── */
  .result-wrap { animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .stage-banner {
    background: var(--green-dark);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
    color: white;
  }
  .stage-banner .stage-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--green-mid);
    margin-bottom: 6px;
  }
  .stage-banner .stage-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    margin-bottom: 14px;
  }
  .stage-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .stat-item {
    background: rgba(255,255,255,0.08);
    border-radius: var(--radius-sm);
    padding: 10px 8px;
  }
  .stat-item .s-label { font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
  .stat-item .s-val { font-size: 13px; font-weight: 500; color: white; }

  .section-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 1rem; overflow: hidden; }
  .section-header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-icon { font-size: 16px; }
  .section-title-text { font-size: 13px; font-weight: 700; color: var(--text); }
  .section-body { padding: 14px 16px; }

  .pill-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }
  .pill-green { background: var(--green-light); color: var(--green-dark); }
  .pill-amber { background: var(--amber-light); color: #8B4513; }
  .pill-seasonal {
    background: var(--green);
    color: white;
  }

  .day-list {}
  .day-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .day-item:last-child { border-bottom: none; }
  .day-badge {
    min-width: 28px;
    height: 28px;
    background: var(--green-light);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--green-dark);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .day-info .menu-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .day-info .recipe-txt { font-size: 12px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }

  .tip-box {
    background: var(--amber-light);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 1rem;
  }
  .tip-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .tip-text { font-size: 13px; color: #7A4020; line-height: 1.6; }

  .reset-btn {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }

  .divider { height: 1px; background: var(--border); margin: 1rem 0; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 11px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
  }

  /* ── Error ── */
  .error-box {
    background: #FEF2F2;
    border: 1px solid #FCA5A5;
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 13px;
    color: #991B1B;
  }
</style>
</head>
<body>

<header>
  <div class="header-tag">AI 이유식 플래너</div>
  <h1>우리 아기 맞춤<br><em>이유식 플랜</em></h1>
  <p>개월 수 입력 하나로 이번 주 식단이 완성돼요</p>
</header>

<main>
  <div id="form-section">
    <!-- 개월 수 -->
    <div class="card">
      <p class="card-title">아이 개월 수</p>
      <div class="months-grid" id="months">
        <button class="month-btn" data-v="5">5개월<span class="stage-hint">초기</span></button>
        <button class="month-btn" data-v="6">6개월<span class="stage-hint">초기</span></button>
        <button class="month-btn" data-v="7">7개월<span class="stage-hint">중기</span></button>
        <button class="month-btn" data-v="8">8개월<span class="stage-hint">중기</span></button>
        <button class="month-btn" data-v="9">9개월<span class="stage-hint">중기</span></button>
        <button class="month-btn" data-v="10">10개월<span class="stage-hint">후기</span></button>
        <button class="month-btn" data-v="11">11개월<span class="stage-hint">후기</span></button>
        <button class="month-btn" data-v="12">12개월<span class="stage-hint">후기</span></button>
      </div>
    </div>

    <!-- 중점 재료 -->
    <div class="card">
      <p class="card-title">이번 주 중점 (선택)</p>
      <div class="options-row" id="focus">
        <button class="opt-btn" data-v="채소 위주">🥦 채소 위주</button>
        <button class="opt-btn" data-v="단백질 추가">🍗 단백질 추가</button>
        <button class="opt-btn" data-v="과일 포함">🍓 과일 포함</button>
        <button class="opt-btn" data-v="새 재료 도전">✨ 새 재료 도전</button>
      </div>
    </div>

    <!-- 알레르기 -->
    <div class="card">
      <p class="card-title">주의 재료 (선택, 복수 가능)</p>
      <div class="options-row" id="allergy">
        <button class="opt-btn allergy" data-v="달걀">달걀</button>
        <button class="opt-btn allergy" data-v="밀가루">밀가루</button>
        <button class="opt-btn allergy" data-v="유제품">유제품</button>
        <button class="opt-btn allergy" data-v="콩류">콩류</button>
        <button class="opt-btn allergy" data-v="견과류">견과류</button>
        <button class="opt-btn allergy" data-v="생선">생선</button>
      </div>
    </div>

    <button class="gen-btn" id="genBtn" disabled>개월 수를 선택해주세요</button>
  </div>

  <div id="result-section" style="display:none"></div>
</main>

<footer>
  이유식 플래너 · AI 기반 맞춤 식단 생성<br>
  <span style="color:#B0BDB3">의료적 결정은 반드시 소아과 전문의와 상담하세요</span>
</footer>

<script>
  let month = null, focus = null, allergies = [];

  // 개월 수
  document.getElementById('months').addEventListener('click', e => {
    const b = e.target.closest('.month-btn');
    if (!b) return;
    document.querySelectorAll('.month-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    month = b.dataset.v;
    const gb = document.getElementById('genBtn');
    gb.disabled = false;
    gb.textContent = `${month}개월 이유식 플랜 만들기`;
  });

  // 중점
  document.getElementById('focus').addEventListener('click', e => {
    const b = e.target.closest('.opt-btn');
    if (!b) return;
    if (b.classList.contains('active')) { b.classList.remove('active'); focus = null; }
    else {
      document.querySelectorAll('#focus .opt-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      focus = b.dataset.v;
    }
  });

  // 알레르기
  document.getElementById('allergy').addEventListener('click', e => {
    const b = e.target.closest('.opt-btn');
    if (!b) return;
    b.classList.toggle('active');
    const v = b.dataset.v;
    allergies = b.classList.contains('active')
      ? [...allergies, v]
      : allergies.filter(x => x !== v);
  });

  // 계절
  function getSeason() {
    const m = new Date().getMonth() + 1;
    if ([3,4,5].includes(m)) return '봄';
    if ([6,7,8].includes(m)) return '여름';
    if ([9,10,11].includes(m)) return '가을';
    return '겨울';
  }

  // 플랜 생성
  document.getElementById('genBtn').addEventListener('click', async () => {
    if (!month) return;
    const season = getSeason();
    const seasonalMap = {
      봄: '시금치, 완두콩, 딸기, 청경채',
      여름: '애호박, 오이, 수박, 가지',
      가을: '고구마, 단호박, 배, 브로콜리',
      겨울: '무, 배추, 시금치, 귤'
    };

    document.getElementById('form-section').style.display = 'none';
    const rs = document.getElementById('result-section');
    rs.style.display = 'block';
    rs.innerHTML = `
      <div class="loading-wrap">
        <span class="loading-icon">🌿</span>
        <p>${month}개월 맞춤 플랜을 만들고 있어요...</p>
        <p style="font-size:12px;margin-top:6px;color:#9CAF9E">제철 재료와 영양 균형을 고려 중이에요</p>
      </div>`;

    const prompt = `소아과 영양 전문가입니다. 다음 조건으로 이유식 주간 플랜을 JSON으로만 응답해주세요.

조건:
- 아이 개월 수: ${month}개월
- 현재 계절: ${season} (제철 재료: ${seasonalMap[season]})
${focus ? `- 이번 주 중점: ${focus}` : ''}
${allergies.length > 0 ? `- 제외할 재료: ${allergies.join(', ')}` : ''}

JSON 형식 (마크다운 없이 순수 JSON만):
{
  "stage": "이유식 단계 (예: 초기 2단계)",
  "texture": "질감 설명",
  "meal_count": "하루 식사 횟수",
  "amount": "1회 식사량",
  "allowed": ["재료1","재료2","재료3","재료4","재료5","재료6"],
  "seasonal": ["이번 계절 추천 재료1","재료2","재료3"],
  "caution": ["주의재료1","주의재료2","주의재료3"],
  "week": [
    {"day":"월","menu":"메뉴명","recipe":"한 줄 레시피"},
    {"day":"화","menu":"메뉴명","recipe":"한 줄 레시피"},
    {"day":"수","menu":"메뉴명","recipe":"한 줄 레시피"},
    {"day":"목","menu":"메뉴명","recipe":"한 줄 레시피"},
    {"day":"금","menu":"메뉴명","recipe":"한 줄 레시피"},
    {"day":"토","menu":"메뉴명","recipe":"한 줄 레시피"},
    {"day":"일","menu":"메뉴명","recipe":"한 줄 레시피"}
  ],
  "tip": "이 시기 가장 중요한 핵심 팁 한 문장"
}`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1200,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) throw new Error(`API ${res.status}`);
      const data = await res.json();
      const raw = data.content?.[0]?.text || '';
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('응답 파싱 실패');
      const p = JSON.parse(match[0]);
      renderResult(p, season);

    } catch(err) {
      rs.innerHTML = `
        <div class="error-box">플랜 생성 중 오류가 생겼어요: ${err.message}</div>
        <br>
        <button class="reset-btn" onclick="resetForm()">← 다시 시도하기</button>`;
    }
  });

  function renderResult(p, season) {
    const rs = document.getElementById('result-section');
    rs.innerHTML = `
      <div class="result-wrap">

        <div class="stage-banner">
          <div class="stage-label">${month}개월 · ${season}</div>
          <div class="stage-name">${p.stage}</div>
          <div class="stage-stats">
            <div class="stat-item">
              <div class="s-label">질감</div>
              <div class="s-val">${p.texture}</div>
            </div>
            <div class="stat-item">
              <div class="s-label">하루 횟수</div>
              <div class="s-val">${p.meal_count}</div>
            </div>
            <div class="stat-item">
              <div class="s-label">1회 식사량</div>
              <div class="s-val">${p.amount}</div>
            </div>
          </div>
        </div>

        <div class="section-card">
          <div class="section-header">
            <span class="section-icon">🌱</span>
            <span class="section-title-text">${season} 제철 추천 재료</span>
          </div>
          <div class="section-body">
            <div class="pill-wrap">
              ${(p.seasonal || []).map(i => `<span class="pill pill-seasonal">${i}</span>`).join('')}
              ${(p.allowed || []).map(i => `<span class="pill pill-green">${i}</span>`).join('')}
            </div>
          </div>
        </div>

        <div class="section-card">
          <div class="section-header">
            <span class="section-icon">⚠️</span>
            <span class="section-title-text">주의할 재료</span>
          </div>
          <div class="section-body">
            <div class="pill-wrap">
              ${(p.caution || []).map(i => `<span class="pill pill-amber">${i}</span>`).join('')}
            </div>
          </div>
        </div>

        <div class="section-card">
          <div class="section-header">
            <span class="section-icon">📅</span>
            <span class="section-title-text">이번 주 7일 플랜</span>
          </div>
          <div class="section-body">
            <div class="day-list">
              ${(p.week || []).map(d => `
                <div class="day-item">
                  <div class="day-badge">${d.day}</div>
                  <div class="day-info">
                    <div class="menu-name">${d.menu}</div>
                    <div class="recipe-txt">${d.recipe}</div>
                  </div>
                </div>`).join('')}
            </div>
          </div>
        </div>

        <div class="tip-box">
          <span class="tip-icon">💡</span>
          <span class="tip-text">${p.tip}</span>
        </div>

        <button class="reset-btn" onclick="resetForm()">← 다른 개월 수로 다시 만들기</button>
      </div>`;
  }

  function resetForm() {
    document.getElementById('form-section').style.display = 'block';
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('result-section').innerHTML = '';
    month = null; focus = null; allergies = [];
    document.querySelectorAll('.month-btn, .opt-btn').forEach(b => b.classList.remove('active'));
    const gb = document.getElementById('genBtn');
    gb.disabled = true;
    gb.textContent = '개월 수를 선택해주세요';
  }
</script>
</body>
